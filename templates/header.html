<header class="sticky-nav">
  <div class="w-full max-w-2xl mx-auto px-6 nav-container">
    <nav class="flex items-center gap-6">
      <a href="{{navHomeHref}}" class="nav-link" id="nav-home">{{navHomeLabel}}</a>
      <a href="{{navBlogHref}}" class="nav-link" id="nav-blog">{{navBlogLabel}}</a>
      <a href="{{navProjectsHref}}" class="nav-link" id="nav-projects">{{navProjectsLabel}}</a>
    </nav>
    <div class="flex items-center gap-2">
      <button class="icon-btn" id="theme-toggle-btn" aria-label="Toggle Dark Mode" data-tooltip="{{themeToggleTooltip}}">
        <!-- Sun Icon (visible in light mode) -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-icon-light"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      </button>
      <a class="lang-toggle-btn" id="lang-switch-btn" href="{{langSwitchHref}}" aria-label="Switch Language" data-tooltip="{{langSwitchTooltip}}">{{langSwitchLabel}}</a>
    </div>
  </div>
</header>
