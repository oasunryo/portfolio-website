<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    /* 라이트 모드일 때 테라코타 오렌지 배경 */
    .bg { fill: #c2410c; transition: fill 0.3s ease; }
    .chip { stroke: #fcfbf9; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    
    /* 브라우저가 다크 모드일 때 선명한 오렌지 배경으로 전환 */
    @media (prefers-color-scheme: dark) {
      .bg { fill: #f97316; }
    }
  </style>
  <!-- 원형 배경 -->
  <circle cx="16" cy="16" r="14" class="bg" />
  <!-- 반도체 패키지 외각 몰드 -->
  <rect x="11" y="11" width="10" height="10" rx="1.5" class="chip" />
  <!-- 내부 실리콘 칩 코어 -->
  <rect x="14" y="14" width="4" height="4" rx="0.5" class="chip" />
  <!-- 와이어 본딩(Wire Bonds) 라인 -->
  <line x1="16" y1="6" x2="16" y2="11" class="chip" />
  <line x1="16" y1="21" x2="16" y2="26" class="chip" />
  <line x1="6" y1="16" x2="11" y2="16" class="chip" />
  <line x1="21" y1="16" x2="26" y2="16" class="chip" />
</svg>
